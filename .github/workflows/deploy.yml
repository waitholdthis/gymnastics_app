name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./landing

      - name: Build landing page
        run: npm run build
        working-directory: ./landing

      - name: Rewrite asset paths for GitHub Pages
        run: find ./landing/out -type f -name "*.html" -exec sed -i 's|"/_next/|"/gymnastics_app/_next/|g; s|"/gymnastics_hero_bkgd.mp4|"/gymnastics_app/gymnastics_hero_bkgd.mp4|g' {} +

      - name: Keep GitHub Pages from running Jekyll
        run: touch ./landing/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./landing/out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
